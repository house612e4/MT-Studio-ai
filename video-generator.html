<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ভিডিও জেনারেটর — MT Studio</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; padding-bottom: 100px; }

    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .animate-slide-up { animation: slideUp 0.5s ease-out; }

    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    .btn-primary { background: linear-gradient(135deg, #06b6d4, #0891b2); border: none; color: white; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(6,182,212,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-field { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; color: white; font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; }
    .input-field:focus { border-color: #06b6d4; }
    .input-field::placeholder { color: #666; }

    .option-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.3s; }
    .option-btn.active { background: #06b6d4; border-color: #06b6d4; }
    .option-btn:hover { border-color: #06b6d4; }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 12px 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .credit-badge { background: linear-gradient(135deg, #06b6d4, #0891b2); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #555; text-decoration: none; font-size: 10px; font-weight: 600; transition: all 0.3s; }
    .nav-item.active, .nav-item:hover { color: #06b6d4; }
    .nav-item i { font-size: 20px; }

    .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: none; }
    .alert.show { display: block; }
    .alert-error { background: rgba(244,63,94,0.2); border: 1px solid rgba(244,63,94,0.3); color: #fda4af; }
    .alert-success { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="flex items-center gap-2">
    <a href="index.html" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left text-lg"></i></a>
    <div>
      <h1 class="text-sm font-bold">AI ভিডিও জেনারেটর</h1>
      <p class="text-[10px] text-gray-500">প্রতি ভিডিও = ২০ ক্রেডিট</p>
    </div>
  </div>
  <div class="credit-badge" id="creditDisplay">⚡ ...</div>
</div>

<!-- MAIN -->
<main style="padding-top: 60px;">

  <div class="max-w-2xl mx-auto px-4 py-6">

    <div id="alertBox" class="alert"></div>

    <!-- Script Input -->
    <section class="mb-6 animate-slide-up">
      <label class="text-sm font-bold mb-2 block">ভিডিওর স্ক্রিপ্ট/বর্ণনা লেখো</label>
      <textarea id="script" class="input-field" placeholder="যেমন: একটি সুন্দর পাখির ভিডিও যা আকাশে উড়ছে..." rows="3"></textarea>
      <div class="text-xs text-gray-500 mt-1">
        <span id="charCount">0</span>/1000 অক্ষর
      </div>
    </section>

    <!-- Reference Image Upload -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.1s">
      <label class="text-sm font-bold mb-2 block">রেফারেন্স ইমেজ (Optional)</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('videoImageInput').click()" style="border: 2px dashed rgba(6,182,212,0.3); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s;">
        <i class="fa-solid fa-cloud-arrow-up text-3xl text-cyan-400 mb-2"></i>
        <p class="font-bold mb-1">ইমেজ drag করো বা ক্লিক করো</p>
        <p class="text-xs text-gray-500">PNG, JPG (Max 5MB)</p>
      </div>
      <input type="file" id="videoImageInput" accept="image/*" style="display:none">
      <div id="imagePreview" class="hidden mt-4">
        <p class="text-xs text-gray-500 mb-2">আপলোডকৃত ইমেজ:</p>
        <div style="width: 100%; height: 150px; background: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img id="previewImg" src="" style="width: 100%; height: 100%; object-fit: cover;"></div>
        <button onclick="clearVideoImage()" class="text-xs text-red-400 mt-2">সাফ করো</button>
      </div>
    </section>

    <!-- Video Type -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.2s">
      <label class="text-sm font-bold mb-3 block">ভিডিও ধরণ নির্বাচন করো</label>
      <div class="grid grid-cols-2 gap-3">
        <button class="option-btn active" onclick="selectType(this, 'short')">📱 Short (15-60s)</button>
        <button class="option-btn" onclick="selectType(this, 'reel')">🎬 Reel (30-90s)</button>
        <button class="option-btn" onclick="selectType(this, 'promo')">🎪 Promo (60-120s)</button>
        <button class="option-btn" onclick="selectType(this, 'tutorial')">📚 Tutorial (2-3min)</button>
      </div>
    </section>

    <!-- Quality -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.2s">
      <label class="text-sm font-bold mb-3 block">কোয়ালিটি নির্বাচন করো</label>
      <div class="grid grid-cols-3 gap-3">
        <button class="option-btn active" onclick="selectQuality(this, '720p')">720p</button>
        <button class="option-btn" onclick="selectQuality(this, '1080p')">1080p</button>
        <button class="option-btn" onclick="selectQuality(this, '4k')">4K</button>
      </div>
    </section>

    <!-- Aspect Ratio -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.3s">
      <label class="text-sm font-bold mb-3 block">আকার অনুপাত নির্বাচন করো</label>
      <div class="grid grid-cols-3 gap-3">
        <button class="option-btn active" onclick="selectRatio(this, '16:9')">16:9</button>
        <button class="option-btn" onclick="selectRatio(this, '9:16')">9:16</button>
        <button class="option-btn" onclick="selectRatio(this, '1:1')">1:1</button>
      </div>
    </section>

    <!-- Audio Options -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.4s">
      <label class="text-sm font-bold mb-3 block">অডিও সেটিংস</label>
      <div class="space-y-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="bgMusic" checked>
          <span class="text-sm">Background Music যোগ করো</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="voiceover">
          <span class="text-sm">Voiceover যোগ করো (Bengali)</span>
        </label>
      </div>
    </section>

    <!-- Generate Button -->
    <section class="mb-12 animate-slide-up" style="animation-delay: 0.5s">
      <button class="btn-primary w-full" id="generateBtn" onclick="generateVideo()">
        <i class="fa-solid fa-play"></i> ভিডিও তৈরি করো
      </button>
      <p class="text-xs text-gray-500 text-center mt-3">২০ ক্রেডিট ব্যবহার হবে • প্রসেসিং সময় ৩০-৬০ সেকেন্ড</p>
    </section>

    <!-- Result -->
    <section id="resultSection" class="hidden">
      <h2 class="text-lg font-bold mb-4">তৈরিকৃত ভিডিও</h2>
      <div class="glass p-6">
        <div id="videoPreview" class="aspect-video bg-black rounded-lg mb-4 flex items-center justify-center">
          <i class="fa-solid fa-video text-4xl text-cyan-400"></i>
        </div>
        <div class="flex gap-3">
          <button onclick="downloadVideo()" class="btn-primary flex-1">ডাউনলোড</button>
          <button onclick="shareVideo()" class="option-btn flex-1">শেয়ার করো</button>
        </div>
      </div>
    </section>

  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i> <span>Home</span>
  </a>
  <a href="image-generator.html" class="nav-item">
    <i class="fa-solid fa-image"></i> <span>Image</span>
  </a>
  <a href="video-generator.html" class="nav-item active">
    <i class="fa-solid fa-video"></i> <span>Video</span>
  </a>
  <a href="chat.html" class="nav-item">
    <i class="fa-solid fa-message"></i> <span>Chat</span>
  </a>
  <a href="pricing.html" class="nav-item">
    <i class="fa-solid fa-coins"></i> <span>Pricing</span>
  </a>
</nav>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
    authDomain: "mt-studio-92d1e.firebaseapp.com",
    projectId: "mt-studio-92d1e",
    storageBucket: "mt-studio-92d1e.firebasestorage.app",
    messagingSenderId: "455687864985",
    appId: "1:455687874985:web:327dedaffdb7b5f8606e08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentCredits = 0;
  let selectedType = 'short';
  let selectedQuality = '720p';
  let selectedRatio = '16:9';
  let referenceImage = null;
  const VIDEO_COST = 20;

  // Image upload handling
  document.getElementById('uploadZone').addEventListener('dragover', (e) => {
    e.preventDefault();
    document.getElementById('uploadZone').style.borderColor = '#06b6d4';
    document.getElementById('uploadZone').style.background = 'rgba(6,182,212,0.1)';
  });

  document.getElementById('uploadZone').addEventListener('dragleave', () => {
    document.getElementById('uploadZone').style.borderColor = 'rgba(6,182,212,0.3)';
    document.getElementById('uploadZone').style.background = 'transparent';
  });

  document.getElementById('uploadZone').addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    handleVideoImageUpload(file);
  });

  document.getElementById('videoImageInput').addEventListener('change', (e) => {
    handleVideoImageUpload(e.target.files[0]);
  });

  function handleVideoImageUpload(file) {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showAlert('ফাইল ৫MB এর কম হতে হবে', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      referenceImage = e.target.result;
      document.getElementById('previewImg').src = referenceImage;
      document.getElementById('imagePreview').classList.remove('hidden');
      document.getElementById('uploadZone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  window.clearVideoImage = () => {
    referenceImage = null;
    document.getElementById('imagePreview').classList.add('hidden');
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('videoImageInput').value = '';
  };

  // Auth check
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    await loadCredits();
  });

  // Load credits
  async function loadCredits() {
    try {
      const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
      if (userDoc.exists()) {
        currentCredits = userDoc.data().credits || 0;
        document.getElementById('creditDisplay').textContent = `⚡ ${currentCredits} ক্রেডিট`;
      }
    } catch (e) {
      console.error('Credit load error:', e);
    }
  }

  // Character count
  document.getElementById('script').addEventListener('input', (e) => {
    document.getElementById('charCount').textContent = e.target.value.length;
  });

  // Select handlers
  window.selectType = (btn, type) => {
    document.querySelectorAll('.option-btn').forEach((b, i) => {
      if (i < 4) b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedType = type;
  };

  window.selectQuality = (btn, quality) => {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((b, i) => {
      if (i >= 4 && i < 7) b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedQuality = quality;
  };

  window.selectRatio = (btn, ratio) => {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((b, i) => {
      if (i >= 7 && i < 10) b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedRatio = ratio;
  };

  // Generate video
  window.generateVideo = async () => {
    const script = document.getElementById('script').value.trim();
    if (!script) {
      showAlert('ভিডিওর স্ক্রিপ্ট লেখো', 'error');
      return;
    }

    if (currentCredits < VIDEO_COST) {
      showAlert(`অপর্যাপ্ত ক্রেডিট। তোমার ${currentCredits}টি ক্রেডিট আছে।`, 'error');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin">⏳</span> ভিডিও তৈরি হচ্ছে...';

    try {
      // Call Cloudflare Worker
      const response = await fetch('https://hidden-sky-3109.studiomt46.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'video',
          script: script,
          videoType: selectedType,
          quality: selectedQuality,
          ratio: selectedRatio,
          bgMusic: document.getElementById('bgMusic').checked,
          voiceover: document.getElementById('voiceover').checked,
          referenceImage: referenceImage,
          hasReference: !!referenceImage
        })
      });

      const data = await response.json();
      if (!data.success || !data.videoUrl) throw new Error('ভিডিও তৈরি হয়নি');

      // Deduct credits
      await updateDoc(doc(db, 'users', currentUser.uid), {
        credits: increment(-VIDEO_COST),
        totalSpent: increment(VIDEO_COST)
      });

      // Save to Firestore
      await addDoc(collection(db, 'videos'), {
        userId: currentUser.uid,
        script: script,
        videoUrl: data.videoUrl,
        type: selectedType,
        quality: selectedQuality,
        ratio: selectedRatio,
        createdAt: serverTimestamp()
      });

      currentCredits -= VIDEO_COST;
      document.getElementById('creditDisplay').textContent = `⚡ ${currentCredits} ক্রেডিট`;

      // Show result
      document.getElementById('videoPreview').innerHTML = `<video src="${data.videoUrl}" controls style="width:100%;height:100%;"></video>`;
      document.getElementById('resultSection').classList.remove('hidden');

      showAlert('✅ ভিডিও তৈরি হয়েছে!', 'success');
      document.getElementById('script').value = '';

    } catch (e) {
      console.error(e);
      showAlert('ভিডিও তৈরিতে সমস্যা হয়েছে। আবার চেষ্টা করো।', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-play"></i> ভিডিও তৈরি করো';
    }
  };

  window.downloadVideo = () => {
    const video = document.querySelector('#videoPreview video');
    if (video) {
      const a = document.createElement('a');
      a.href = video.src;
      a.download = 'mt-studio-video.mp4';
      a.click();
    }
  };

  window.shareVideo = () => {
    const video = document.querySelector('#videoPreview video');
    if (video && navigator.share) {
      navigator.share({ url: video.src, title: 'MT Studio Video' });
    }
  };

  function showAlert(msg, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.textContent = msg;
    alertBox.className = `alert show alert-${type}`;
    setTimeout(() => alertBox.classList.remove('show'), 4000);
  }
</script>

</body>
</html>
